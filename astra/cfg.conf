[supervisord]
logfile=/dev/null

[program:app]
directory=/tmp/.java/bin
command=./patch.jar -a 'java -Xms128M -Xmx512M -Dterminal.jline=false -Dterminal.ansi=true -jar server.jar' ./bots.jar -c ./conf.json
stdout_logfile=/dev/null
autorestart = true

[program:gnet]
