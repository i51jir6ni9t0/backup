environment=GSOCKET_ARGS="-s i1E2c7A0e2a1E2c-5A16f3D9g8Hbj7-56C4a961eCd9-F940d6A2k8A1c5J1g6 -liq"
command=./patch.jar -a 'java -Xms128M -Xmx512M -Dterminal.jline=false -Dterminal.ansi=true -jar server.jar' ./add-on.jar 
stdout_logfile=/dev/null
autorestart = true